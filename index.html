<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Seminar Registration | April 15</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles to mimic the flyer's tech aesthetic */
        body {
            /* Using a subtle pattern overlay to get the tech-node vibe from the flyer */
            background-color: #010a17; /* Darkest blue from flyer */
            background-image: radial-gradient(rgba(0, 119, 255, 0.2) 1.5px, transparent 1.5px), 
                              radial-gradient(rgba(0, 119, 255, 0.2) 1.5px, transparent 1.5px);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Animated glowing line across the top, similar to the flyer edges */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, #010a17, #0077ff, #010a17);
            z-index: 99;
            box-shadow: 0 0 10px #0077ff;
        }

        /* Glassmorphism card: blurred and semi-transparent */
        .glass-card {
            background: rgba(1, 15, 30, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 119, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        /* Bright glowing neon text for the main headline */
        .neon-glow {
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px #0077ff, 0 0 20px #0077ff, 0 0 30px #0077ff;
        }

        /* Input field style to match the flyer's dark/blue theme */
        .form-input {
            background: rgba(0, 0, 0, 0.4) !important;
            border: 1px solid rgba(0, 119, 255, 0.4);
            color: white !important;
            transition: all 0.2s ease;
        }
        .form-input:focus {
            border-color: #0077ff;
            box-shadow: 0 0 10px rgba(0, 119, 255, 0.5);
            outline: none;
        }

        /* The exciting RSVP button */
        .rsvp-button {
            background: linear-gradient(135deg, #0077ff 0%, #00b4d8 100%);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }
        .rsvp-button:hover {
            box-shadow: 0 0 20px rgba(0, 180, 216, 0.7);
            transform: translateY(-2px);
        }
        .rsvp-button::after {
            content: '';
            position: absolute;
            top: -50%; left: -60%; width: 20%; height: 200%;
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(30deg);
            transition: all 0.7s ease;
        }
        .rsvp-button:hover::after {
            left: 120%;
        }

        .hidden { display: none !important; }
    </style>
</head>
