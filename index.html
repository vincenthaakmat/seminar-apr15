<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Seminar Registration | April 15</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #010a17; color: white; font-family: ui-sans-serif, system-ui; background-image: radial-gradient(rgba(0, 119, 255, 0.2) 1.5px, transparent 1.5px); background-size: 40px 40px; }
        .glass-card { background: rgba(1, 15, 30, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(0, 119, 255, 0.3); }
        .neon-glow { text-shadow: 0 0 15px #0077ff; }
        .form-input { background: rgba(0, 0, 0, 0.7) !important; border: 1px solid rgba(0, 119, 255, 0.3); color: white !important; }
        .rsvp-button { background: linear-gradient(135deg, #0077ff 0%, #00b4d8 100%); transition: all 0.3s; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full">
        <div id="reg-card" class="glass-card rounded-2xl p-8 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full py-2 text-center text-[10px] font-black uppercase tracking-[0.2em] bg-red-600">
                ⚠️ ONLY <span id="spots-left">15</span> SPOTS REMAINING
            </div>

            <div class="text-center mb-8 mt-8">
                <h1 class="text-3xl font-extrabold neon-glow uppercase tracking-tighter">Double Your Business Account</h1>
                <p class="text-blue-400 font-bold mt-1 text-lg italic tracking-widest uppercase">WITH AI</p>
                <p class="text-[10px] text-gray-400 mt-2 uppercase tracking-widest">Holland House | April 15th | 6pm - 8pm</p>
            </div>

            <form id="ajaxForm" class="space-y-4">
                <div>
                    <label class="block text-[10px] uppercase text-gray-400 mb-1 font-bold">Full Name</label>
                    <input type="text" name="name" id="userName" required class="form-input w-full rounded-lg p-4 text-sm outline-none">
                </div>
                <div>
                    <label class="block text-[10px] uppercase text-gray-400 mb-1 font-bold">Email Address</label>
                    <input type="email" name="email" id="userEmail" required class="form-input w-full rounded-lg p-4 text-sm outline-none">
                </div>
                <div>
                    <label class="block text-[10px] uppercase text-gray-400 mb-1 font-bold">WhatsApp Number</label>
                    <input type="tel" name="phone" id="userPhone" required class="form-input w-full rounded-lg p-4 text-sm outline-none" placeholder="+1 721...">
                </div>

                <button type="submit" id="submitBtn" class="rsvp-button w-full text-white font-black py-5 rounded-xl text-lg uppercase tracking-tighter mt-4 shadow-lg">
                    YES, I WANT TO BE THERE! ($15)
                </button>
            </form>
        </div>

        <div id="bank-card" class="hidden glass-card rounded-3xl p-8 border-blue-500 border-2 text-center shadow-2xl">
            <div class="mx-auto flex items-center justify-center h-14 w-14 rounded-full bg-green-900/40 border-2 border-green-500 mb-6">
                <svg class="h-8 w-8 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7" /></svg>
            </div>
            <h2 class="text-3xl font-black mb-1 text-white uppercase italic neon-glow">Registration Sent!</h2>
            <p class="text-blue-400 text-xs font-bold mb-8 uppercase tracking-widest">Step 2: Complete Payment</p>
            
            <div class="bg-black/80 p-6 rounded-2xl text-left border border-blue-900/50 space-y-3 mb-8">
                <img src="image_16d907.png" class="h-10 mb-2 rounded" onerror="this.style.display='none'">
                <p class="text-sm"><b>Bank:</b> <a href="https://www.wib-bank.net/personal" target="_blank" class="text-blue-400 underline">WIB Bank</a></p>
                <p class="text-sm"><b>Name:</b> VHC Solutions BV</p>
                <p class="text-sm"><b>Acc #:</b> 820471-03</p>
                <div class="mt-4 pt-4 border-t border-blue-900/50 text-center">
                    <p class="text-yellow-400 text-[10px] uppercase font-bold italic mb-1">REQUIRED MEMO CODE</p>
                    <p id="finalCodeDisplay" class="text-4xl font-mono font-black text-white bg-blue-950/50 py-3 rounded-lg border-2 border-blue-600 tracking-widest"></p>
                </div>
            </div>
            <p class="text-[10px] text-gray-500 mb-6 uppercase tracking-wider font-bold">Screenshot this now. Use the code above in your bank memo.</p>
            <button onclick="window.location.reload()" class="text-blue-400 text-[10px] uppercase underline">Register Another</button>
        </div>
    </div>

    <script>
        const SPOTS_REMAINING = 15; // Edit this number as people pay
        document.getElementById('spots-left').innerText = SPOTS_REMAINING;

        const randomCode = "AI-" + Math.floor(1000 + Math.random() * 8999);
        const formId = "6p8OWQR0U";

        document.getElementById('ajaxForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "SENDING...";
            btn.disabled = true;

            const data = {
                name: document.getElementById('userName').value,
                email: document.getElementById('userEmail').value,
                phone: document.getElementById('userPhone').value,
                reference_code: randomCode
            };

            try {
                const response = await fetch(`https://submit-form.com/${formId}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Accept": "application/json" },
                    body: JSON.stringify(data),
                });

                if (response.ok) {
                    document.getElementById('reg-card').classList.add('hidden');
                    document.getElementById('bank-card').classList.remove('hidden');
                    document.getElementById('finalCodeDisplay').innerText = randomCode;
                } else {
                    throw new Error("Failed");
                }
            } catch (err) {
                // FALLBACK: If it fails, we still show the bank info so you don't lose the sale
                document.getElementById('reg-card').classList.add('hidden');
                document.getElementById('bank-card').classList.remove('hidden');
                document.getElementById('finalCodeDisplay').innerText = randomCode;
            }
        };
    </script>
</body>
</html>
