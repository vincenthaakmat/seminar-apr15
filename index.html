<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FULLY BOOKED | AI Seminar Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #010a17; color: white; font-family: ui-sans-serif, system-ui; background-image: radial-gradient(rgba(0, 119, 255, 0.15) 1px, transparent 1px); background-size: 30px 30px; -webkit-font-smoothing: antialiased; }
        .glass-card { background: rgba(1, 15, 30, 0.96); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(0, 119, 255, 0.3); }
        .neon-glow { text-shadow: 0 0 15px #0077ff, 0 0 5px #ffffff; }
        .form-input { background: rgba(0, 0, 0, 0.8) !important; border: 1px solid rgba(0, 119, 255, 0.3); color: white !important; font-size: 16px !important; }
        .rsvp-button { background: #334155; cursor: not-allowed; opacity: 0.5; }
        .wa-float { position: fixed; bottom: 20px; right: 20px; background: #25D366; border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 100; }
        
        /* FULLY BOOKED STYLES */
        .watermark-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(1, 10, 23, 0.9);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1.5rem;
        }
        .watermark-text {
            position: absolute;
            color: rgba(239, 68, 68, 0.12);
            font-size: 6rem;
            font-weight: 900;
            text-transform: uppercase;
            transform: rotate(-20deg);
            white-space: nowrap;
            pointer-events: none;
        }
        .sticky-note {
            position: relative;
            background: #ffeb3b;
            color: #1a1a1a;
            padding: 1.5rem;
            width: 90%;
            max-width: 300px;
            transform: rotate(-2deg);
            box-shadow: 10px 10px 0 rgba(0,0,0,0.3);
            font-family: 'Comic Sans MS', cursive, sans-serif;
            text-align: center;
            z-index: 60;
        }
        .sticky-note::before {
            content: '';
            position: absolute;
            top: 8px; left: 50%;
            transform: translateX(-50%);
            width: 14px; height: 14px;
            background: #cc0000;
            border-radius: 50%;
        }
        .sorry-text { font-size: 2.5rem; font-weight: bold; line-height: 1; margin-bottom: 8px; }
        .msg-text { font-size: 1rem; font-weight: bold; line-height: 1.2; }
        .cancel-note { font-size: 0.85rem; margin-top: 12px; font-style: italic; border-top: 1px solid rgba(0,0,0,0.1); pt-2; }

        .counter-badge { 
            background: #450a0a; 
            border-bottom: 2px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-6 px-4 mb-20">

    <a href="https://wa.me/17215208613?text=Hi!%20I%20saw%20the%20AI%20Seminar%20is%20full,%20is%20there%20a%20waiting%20list?" target="_blank" class="wa-float">
        <svg width="35" height="35" fill="white" viewBox="0 0 24 24"><path d="M12.031 6.172c-2.203 0-4.004 1.801-4.004 4.004 0 2.203 1.801 4.004 4.004 4.004 2.203 0 4.004-1.801 4.004-4.004 0-2.203-1.801-4.004-4.004-4.004zM12 2C6.477 2 2 6.477 2 12c0 1.891.531 3.655 1.449 5.156L2 22l4.981-1.343A9.948 9.948 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2zm0 18c-1.722 0-3.328-.535-4.66-1.445l-.332-.227-2.836.765.777-2.734-.246-.356A7.954 7.954 0 014 12c0-4.411 3.589-8 8-8s8 3.589 8 8-3.589 8-8 8z"/></svg>
    </a>

    <div class="mb-6 text-center bg-blue-900/20 p-4 rounded-2xl border border-blue-500/30 glass-card w-full max-w-sm">
        <p class="text-[9px] uppercase tracking-[0.2em] text-blue-400 font-black mb-3">Event Starts In</p>
        <div id="countdown" class="text-2xl font-black font-mono flex gap-4 justify-center">
            <div class="flex flex-col text-gray-500"><span>00</span><span class="text-[8px] uppercase">Days</span></div>
            <div class="flex flex-col text-gray-500"><span>00</span><span class="text-[8px] uppercase">Hrs</span></div>
            <div class="flex flex-col text-gray-500"><span>00</span><span class="text-[8px] uppercase">Min</span></div>
            <div class="flex flex-col text-gray-500"><span>00</span><span class="text-[8px] uppercase">Sec</span></div>
        </div>
    </div>

    <div class="max-w-xl w-full">
        <div id="reg-card" class="glass-card rounded-3xl p-6 md:p-8 relative overflow-hidden mb-6">
            
            <div class="watermark-overlay">
                <div class="watermark-text">FULLY BOOKED</div>
                <div class="sticky-note">
                    <p class="sorry-text">Sorry!!</p>
                    <p class="msg-text">We are completely full.</p>
                    <p class="cancel-note">We may allow walk-ins at the door in case of last-minute cancellations.</p>
                </div>
            </div>

            <div class="counter-badge absolute top-0 left-0 w-full py-3 z-10 opacity-50">
                <span class="text-[11px] font-black uppercase tracking-[0.2em]">⚠️ STATUS:</span>
                <span class="text-xl font-black">0</span>
                <span class="text-[11px] font-black uppercase tracking-[0.2em]">SPOTS LEFT</span>
            </div>

            <div class="text-center mb-8 mt-12 opacity-40">
                <h1 class="text-2xl md:text-3xl font-extrabold neon-glow uppercase tracking-tighter leading-tight">Double Your Business Account</h1>
                <p class="text-blue-400 font-bold text-lg italic uppercase mt-1">WITH AI</p>
                <p class="text-[10px] text-gray-400 mt-3 font-bold tracking-widest uppercase">Holland House | April 15 | 6pm - 8pm</p>
            </div>

            <div class="space-y-4 opacity-20 pointer-events-none">
                <input type="text" placeholder="Full Name" disabled class="form-input w-full rounded-xl p-4">
                <input type="email" placeholder="Email Address" disabled class="form-input w-full rounded-xl p-4">
                <input type="tel" placeholder="WhatsApp Number" disabled class="form-input w-full rounded-xl p-4">
                <button disabled class="rsvp-button w-full text-white font-black py-5 rounded-2xl text-lg uppercase shadow-xl mt-4">
                    REGISTRATION CLOSED
                </button>
            </div>
        </div>
    </div>
</body>
</html>
